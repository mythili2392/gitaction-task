name: Docker CI-CD

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      # 1️⃣ Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Build Docker image (CI part)
      - name: Build Docker Image
        run: docker build -t my-app .

      # 3️⃣ Deploy to EC2 via SSH (CD part)
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |

            # Clone repo if not exists
            if [ ! -d "gitaction-task" ]; then
              git clone https://github.com/mythili2392/gitaction-task.git
            fi

            cd gitaction-task

            # Pull latest code
            git pull origin main

            # Stop existing container
            docker stop my-app || true
            docker rm my-app || true

            # Remove old image
            docker rmi my-app || true

            # Build new image
            docker build -t my-app .

            # Run container
            docker run -d -p 80:80 --name my-app my-app
